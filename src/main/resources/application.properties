# ============================================================
# SBI LMS — application.properties
# DevSecOps Training: secrets come from environment variables,
# never from this file.
# ============================================================

spring.application.name=lms

# --- Database (H2 in-memory for lab; swap for MySQL in prod) ---
spring.datasource.url=jdbc:h2:mem:lmsdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console — dev only, useful during labs
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT — SECRET MUST come from environment variable / Vault ---
# LAB 1: SonarQube will flag the hardcoded value in JwtUtils.java, not here.
# This property is used AFTER the Lab 1 fix — set JWT_SECRET in your environment.
jwt.secret=${JWT_SECRET:ChangeMeChangeMe1234567890123456}
jwt.expiration.ms=900000

# --- Actuator — expose only health and info (A05 Security Misconfiguration) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# --- OpenAPI / Swagger — enabled for ZAP DAST scanning in dev ---
# In production both must be false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# --- Server ---
server.port=8080

# --- Suppress full stack traces in error responses (A05) ---
server.error.include-stacktrace=never
server.error.include-message=never
